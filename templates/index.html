<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manshi{Tatty} Social</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Dancing+Script:wght@700&family=Pacifico&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style>
        :root {
            --bg-color: #ffe4e8;
            --text-color: #4a4a4a;
            --card-bg: white;
            --accent: #d81b60;
            --btn-bg: #ff85a2;
            --btn-hover: #ff6b8b;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg-color: #1a1a2e;
            --text-color: #e6e6e6;
            --card-bg: #16213e;
            --accent: #ff85a2;
            --btn-bg: #e94560;
            --btn-hover: #d81b60;
            --shadow: rgba(0,0,0,0.5);
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; transition: 0.4s; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 20px auto; padding: 10px 20px; background: var(--card-bg); border-radius: 15px; box-shadow: 0 4px 10px var(--shadow); transition: 0.4s; }
        .profile-pic { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--btn-bg); cursor: pointer; }
        .search-bar { padding: 8px 15px; border-radius: 20px; border: 2px solid var(--btn-bg); width: 250px; outline: none; background: var(--bg-color); color: var(--text-color); }
        .theme-btn { background: none; border: none; font-size: 24px; cursor: pointer; }

        .nav-tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .tab-btn { cursor: pointer; padding: 10px 20px; border-radius: 20px; background: var(--card-bg); border: 2px solid var(--btn-bg); font-weight: bold; color: var(--btn-bg); transition: 0.3s; }
        .tab-btn.active { background: var(--btn-bg); color: white; }
        .section { display: none; max-width: 1000px; margin: 0 auto; }
        .section.active { display: block; }
        
        /* UI Components */
        .upload-menu, .user-header { background-color: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px var(--shadow); transition: 0.4s; }
        .upload-menu { display: inline-flex; flex-direction: column; gap: 10px; margin-bottom: 30px; width: 350px; text-align: left; }
        .upload-btn { border: none; color: white; background-color: var(--btn-bg); padding: 10px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .upload-btn:hover { background-color: var(--btn-hover); }
        .bio-box { width: 95%; background: var(--bg-color); color: var(--text-color); border: 2px solid var(--btn-bg); border-radius: 10px; padding: 10px; resize: none; margin-bottom: 10px;}
        
        /* Gallery Styles */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .media-card { background: var(--card-bg); padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px var(--shadow); text-align: left; display: flex; flex-direction: column; transition: 0.4s;}
        .media-card img, .media-card video { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; }
        .user-tag { font-weight:bold; margin-bottom:10px; color:var(--btn-bg); cursor:pointer; display: inline-block; transition: 0.2s;}
        .user-tag:hover { transform: scale(1.05); text-decoration: underline; }
        .comments-section { background: var(--bg-color); padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 14px; max-height: 150px; overflow-y: auto; transition: 0.4s;}
        .comment-item { margin-bottom: 5px; }
        .comment-input-row { display: flex; gap: 5px; margin-top: 10px; }
        
        /* Chat UI Styles */
        .chat-container { display: flex; height: 600px; background: var(--card-bg); border-radius: 15px; box-shadow: 0 4px 10px var(--shadow); overflow: hidden; text-align: left; }
        .chat-sidebar { width: 30%; border-right: 2px solid var(--bg-color); overflow-y: auto; background: var(--card-bg); }
        .chat-user-item { padding: 15px; border-bottom: 1px solid var(--bg-color); cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .chat-user-item:hover { background: var(--bg-color); }
        .chat-window { width: 70%; display: flex; flex-direction: column; background: var(--bg-color); }
        .chat-header { padding: 15px; background: var(--btn-bg); color: white; font-weight: bold; font-size: 20px; }
        .chat-messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-bubble { padding: 10px 15px; border-radius: 20px; max-width: 70%; word-wrap: break-word; font-size: 16px; }
        .bubble-me { background: var(--btn-bg); color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .bubble-them { background: var(--card-bg); color: var(--text-color); align-self: flex-start; border-bottom-left-radius: 0; border: 1px solid var(--btn-bg); }
        .chat-input-area { padding: 15px; background: var(--card-bg); display: flex; gap: 10px; }

        .auth-box { background: var(--card-bg); padding: 30px; border-radius: 15px; width: 300px; margin: 20px auto; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 4px 10px var(--shadow); }
        input, select { padding: 10px; border-radius: 8px; border: 2px solid var(--btn-bg); outline: none; background: var(--card-bg); color: var(--text-color); transition: 0.4s; }
    </style>
</head>
<body>

    {% if username %}
    <script> const currentUser = "{{ username }}"; </script>

   <div class="top-bar">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="{% if pfp %}/uploads/{{ pfp }}{% else %}https://cdn-icons-png.flaticon.com/512/149/149071.png{% endif %}" class="profile-pic" onclick="document.getElementById('pfpInput').click()">
            <h3 style="margin:0;">{{ username }}</h3>
        </div>
        
        <input type="text" id="searchInput" class="search-bar" placeholder="Search #hashtags..." onkeyup="searchGallery()">
        
        <div style="display:flex; align-items:center; gap:15px; position:relative;">
            <button class="theme-btn" id="themeToggleBtn" onclick="toggleTheme()">🌙</button>
            
            <div style="position:relative; cursor:pointer;" onclick="toggleNotifications()">
                <span style="font-size:24px; user-select:none;">🔔</span>
                <div id="notifDot" style="display:none; position:absolute; top:0; right:0; width:10px; height:10px; background:red; border-radius:50%;"></div>
            </div>
            
            <div id="notifDropdown" style="display:none; position:absolute; top:40px; right:0px; width:250px; background:var(--card-bg); border:2px solid var(--btn-bg); border-radius:10px; padding:10px; z-index:1000; box-shadow:0 4px 10px var(--shadow); max-height:200px; overflow-y:auto; font-size:14px; text-align:left;">
                <b style="color:var(--accent);">Notifications</b>
                <hr style="opacity:0.3; margin:5px 0;">
                <div id="notifList">No new notifications.</div>
            </div>

            <a href="/logout" style="color: var(--text-color); font-weight:bold; text-decoration:none;">Logout</a>
        </div>
    </div> <form id="pfpForm" action="/update-pfp" method="POST" enctype="multipart/form-data" style="display:none;">
        <input type="file" id="pfpInput" name="pfp" accept="image/*" onchange="document.getElementById('pfpForm').submit()">
    </form>

    <h1 style="color: var(--accent);">Manshi{Tatty}</h1>

    <div class="nav-tabs">
        <div class="tab-btn active" onclick="showSection('home-sec', this); loadHome();">Home</div>
        <div class="tab-btn" onclick="showSection('chat-sec', this); loadUsersForChat();">Chat 💬</div>
        <div class="tab-btn" onclick="showSection('profile-sec', this); loadProfile();">My Profile</div>
    </div>

   <div id="home-sec" class="section active">
        <div style="margin-bottom: 20px;">
            <button class="upload-btn" id="exploreBtn" onclick="setFeedType('explore')" style="background:var(--accent);">Explore</button>
            <button class="upload-btn" id="followingBtn" onclick="setFeedType('following')" style="background:gray;">Following</button>
        </div>
        <div class="gallery" id="homeGallery"></div>
    </div>

    <div id="profile-sec" class="section">
        <div class="user-header" style="margin-bottom: 30px;">
            <h2 style="margin: 0;">My Profile</h2>
            <textarea id="myBioInput" class="bio-box" rows="2" placeholder="Write a short bio...">{{ bio }}</textarea>
            <button class="upload-btn" onclick="saveBio()">Save Bio</button>
        </div>
        <div class="upload-menu">
            <h3 style="margin: 0; color: var(--accent);">Post a Memory</h3>
            <input type="file" id="mediaInput" accept="image/*,video/*">
            <input type="text" id="captionInput" placeholder="Caption with #hashtags...">
            <div style="display: flex; gap: 10px;">
                <select id="fontInput" style="flex: 1;"><option value="'Segoe UI'">Standard</option><option value="'Dancing Script', cursive">Elegant</option><option value="'Caveat', cursive">Handwriting</option></select>
                <select id="filterInput" style="flex: 1;"><option value="none">No Filter</option><option value="grayscale(100%)">B&W</option><option value="sepia(100%)">Vintage</option></select>
            </div>
            <button class="upload-btn" onclick="uploadVideoFallback()">Post Video</button>
        </div>
        <div class="gallery" id="profileGallery"></div>
    </div>

    <div id="view-user-sec" class="section">
        <button class="upload-btn" onclick="showSection('home-sec', document.querySelectorAll('.tab-btn')[0]); loadHome();" style="margin-bottom: 20px;">← Back to Home</button>
        <div class="user-header">
            <img id="viewUserPfp" src="" class="profile-pic" style="width: 100px; height: 100px; border-width: 4px;">
            <h2 id="viewUserName" style="color: var(--accent); margin: 0; font-size: 32px;"></h2>
            <p id="viewUserBio" style="font-style: italic; font-size: 18px; color: var(--text-color);"></p>
            
            <div style="display:flex; justify-content:center; gap:20px; margin: 15px 0; font-weight:bold;">
                <span id="viewUserFollowers">0 Followers</span>
                <span id="viewUserFollowing">0 Following</span>
            </div>
            <button id="followBtn" class="upload-btn" style="display:none;" onclick="toggleFollow()"></button>
            
        </div>
        <hr style="border: 1px solid var(--btn-bg); margin-bottom: 20px; opacity: 0.3;">
        <div class="gallery" id="viewUserGallery"></div>
    </div>

    <div id="chat-sec" class="section">
        <div class="chat-container">
            <div class="chat-sidebar" id="chatUserList"></div>
            <div class="chat-window">
                <div class="chat-header" id="chatHeaderName">Select a friend to start chatting!</div>
                <div class="chat-messages" id="chatMessagesBox"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
                    <button class="upload-btn" style="padding: 10px 20px;" onclick="sendChatMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cropperModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:3000; align-items:center; justify-content:center; flex-direction:column;">
        <div style="background:var(--card-bg); padding:20px; border-radius:15px; width:90%; max-width:500px; text-align:center;">
            <h2 style="color:var(--accent); margin-top:0;">Crop Your Photo</h2>
            
            <div style="max-height: 400px; overflow: hidden; background: #333; margin-bottom: 20px;">
                <img id="cropperImage" style="max-width: 100%; display: block;">
            </div>
            
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
    <button class="upload-btn" style="background:gray;" onclick="cancelCrop()">Cancel</button>
    <button class="upload-btn" style="background:var(--accent);" onclick="submitOriginalImage()">Post Original</button>
    <button class="upload-btn" onclick="submitCroppedImage()">Crop & Post!</button>
</div>
        </div>
    </div>

    <script>
        const socket = io(); 
        let currentChatUser = null;
        // --- LIVE NOTIFICATIONS ENGINE ---

// 1. Tell the server to put us in our notification room when we log in
socket.on('connect', () => {
    if (typeof currentUser !== 'undefined') { 
        socket.emit('user_connected', { username: currentUser }); 
    }
});

// 2. Listen for the 'ping' from the server
socket.on('receive_notification', (data) => {
    // Show the red dot!
    document.getElementById('notifDot').style.display = 'block';
    
    // Add the new message to the top of the dropdown list
    const list = document.getElementById('notifList');
    if(list.innerText === "No new notifications.") list.innerHTML = '';
    list.innerHTML = `<div style="padding:5px 0; border-bottom:1px solid var(--bg-color);">${data.message}</div>` + list.innerHTML;
});

// 3. Open/Close the dropdown
function toggleNotifications() {
    const box = document.getElementById('notifDropdown');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
    document.getElementById('notifDot').style.display = 'none'; // Hide dot when they read it
}

// 4. Load past notifications when the page first opens
function loadNotifications() {
    fetch('/api/notifications').then(r => r.json()).then(notifs => {
        if(notifs.length > 0) {
            const list = document.getElementById('notifList');
            list.innerHTML = '';
            notifs.forEach(n => {
                list.innerHTML += `<div style="padding:5px 0; border-bottom:1px solid var(--bg-color);">${n.message}</div>`;
            });
        }
    });
}
        // --- WEBSOCKET CHAT ENGINE ---
        
        function loadUsersForChat() {
            fetch('/api/all-users', { cache: 'no-store' }).then(r => r.json()).then(users => {
                const sidebar = document.getElementById('chatUserList'); sidebar.innerHTML = '';
                users.forEach(u => {
                    const pfp = u.pfp ? '/uploads/' + u.pfp : 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                    sidebar.innerHTML += `<div class="chat-user-item" onclick="openChat('${u.username}')"><img src="${pfp}" class="profile-pic" style="width:40px; height:40px;"><b style="color: var(--text-color);">@${u.username}</b></div>`;
                });
            });
        }
        function openChat(username) {
            currentChatUser = username; document.getElementById('chatHeaderName').innerText = "Chatting with @" + username; document.getElementById('chatMessagesBox').innerHTML = ''; 
            fetch('/api/messages/' + username).then(r => r.json()).then(msgs => { msgs.forEach(m => appendMessage(m.sender, m.text)); scrollToBottom(); });
            socket.emit('join_chat', { other_user: username });
        }
        function sendChatMessage() {
            if (!currentChatUser) return alert("Select a friend from the left to chat with!");
            const input = document.getElementById('chatInput'); const text = input.value.trim(); if (!text) return;
            socket.emit('send_message', { receiver: currentChatUser, text: text }); input.value = ''; 
        }
        socket.on('receive_message', function(data) {
            if (currentChatUser === data.sender || currentUser === data.sender) { appendMessage(data.sender, data.text); scrollToBottom(); }
        });
        function appendMessage(sender, text) {
            const isMe = (sender === currentUser); const bubbleClass = isMe ? 'bubble-me' : 'bubble-them';
            document.getElementById('chatMessagesBox').innerHTML += `<div class="chat-bubble ${bubbleClass}">${text}</div>`;
        }
        function scrollToBottom() { const box = document.getElementById('chatMessagesBox'); box.scrollTop = box.scrollHeight; }

        // --- THEME & SEARCH ---
        function toggleTheme() {
            document.body.classList.toggle('dark-mode'); const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light'); document.getElementById('themeToggleBtn').innerText = isDark ? '☀️' : '🌙';
        }
        function searchGallery() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.media-card').forEach(card => {
                const caption = card.querySelector('.media-caption').innerText.toLowerCase();
                card.style.display = caption.includes(searchText) ? 'flex' : 'none';
            });
        }
        function showSection(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); if (btn) btn.classList.add('active'); 
        }
        function saveBio() {
            const fd = new FormData(); fd.append('bio', document.getElementById('myBioInput').value);
            fetch('/update-bio', { method: 'POST', body: fd }).then(() => alert('Bio saved!'));
        }

        // --- INFINITE SCROLL ENGINE ---
        let currentFeed = 'home', currentTargetUser = '', currentPage = 1, isLoading = false, hasMore = true;
        function resetFeedState(feedType, user = '') {
            currentFeed = feedType; currentTargetUser = user; currentPage = 1; hasMore = true; isLoading = false;
            if(feedType === 'home') document.getElementById('homeGallery').innerHTML = '';
            if(feedType === 'profile') document.getElementById('profileGallery').innerHTML = '';
            if(feedType === 'view-user') document.getElementById('viewUserGallery').innerHTML = '';
        }
        function loadHome() { resetFeedState('home'); fetchPosts(); }
        function setFeedType(type) {
    currentFeed = type; // Can be 'explore' or 'following'
    document.getElementById('exploreBtn').style.background = type === 'explore' ? 'var(--accent)' : 'gray';
    document.getElementById('followingBtn').style.background = type === 'following' ? 'var(--accent)' : 'gray';
    document.getElementById('homeGallery').innerHTML = ''; // Clear the board
    currentPage = 1; hasMore = true; isLoading = false;
    fetchPosts();
}

// Ensure loadHome defaults to explore
function loadHome() { setFeedType('explore'); }
        function loadProfile() { resetFeedState('profile'); fetchPosts(); }
        function viewUserProfile(targetUsername) {
    if (targetUsername === currentUser) { showSection('profile-sec', document.querySelectorAll('.tab-btn')[2]); loadProfile(); return; }
    showSection('view-user-sec', null); 
    document.getElementById('viewUserName').innerText = "@" + targetUsername;
    
    fetch('/api/user/' + targetUsername).then(r => r.json()).then(data => {
        document.getElementById('viewUserPfp').src = data.pfp ? '/uploads/' + data.pfp : 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        document.getElementById('viewUserBio').innerText = data.bio ? `"${data.bio}"` : "This user hasn't written a bio yet.";
        
        // Populate the stats
        document.getElementById('viewUserFollowers').innerText = `${data.followers_count} Followers`;
        document.getElementById('viewUserFollowing').innerText = `${data.following_count} Following`;
        
        // Setup the Follow Button
        const fBtn = document.getElementById('followBtn');
        fBtn.style.display = 'inline-block';
        fBtn.innerText = data.is_following ? "Unfollow" : "Follow";
        fBtn.style.background = data.is_following ? "gray" : "var(--accent)";
    });
    
    resetFeedState('view-user', targetUsername); fetchPosts();
}

// Add the follow trigger function right below it!
function toggleFollow() {
    const target = document.getElementById('viewUserName').innerText.replace('@', '');
    fetch('/follow/' + target, {method: 'POST'}).then(() => viewUserProfile(target)); // Reloads profile to update counts
}
        function fetchPosts() {
    if (isLoading || !hasMore) return; isLoading = true;
    let url = '', containerId = '';
    
    if (currentFeed === 'explore') { url = `/get-public-media?page=${currentPage}`; containerId = 'homeGallery'; } 
    else if (currentFeed === 'following') { url = `/get-following-media?page=${currentPage}`; containerId = 'homeGallery'; } // NEW!
    else if (currentFeed === 'profile') { url = `/get-profile-media?page=${currentPage}`; containerId = 'profileGallery'; } 
    else if (currentFeed === 'view-user') { url = `/api/user-posts/${currentTargetUser}?page=${currentPage}`; containerId = 'viewUserGallery'; }
    
    fetch(url).then(r => r.json()).then(items => {
        if (items.length === 0) hasMore = false; 
        else {
            const container = document.getElementById(containerId);
            items.forEach(item => container.innerHTML += createCardHTML(item)); currentPage++;
        }
        isLoading = false;
    }).catch(() => isLoading = false);
}
        window.addEventListener('scroll', () => { if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) fetchPosts(); });

        // --- CROPPER ENGINE ---
        let cropper;

        // Automatically open the Cropper when they select an image!
        document.getElementById('mediaInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.type.startsWith('video/')) return; // Videos don't get cropped!

            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('cropperImage').src = event.target.result;
                document.getElementById('cropperModal').style.display = 'flex';
                
                if (cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('cropperImage'), {
                    aspectRatio: 1, // Locks it to a perfect 1:1 Square
                    viewMode: 2
                });
            };
            reader.readAsDataURL(file);
        });

        function cancelCrop() {
            document.getElementById('cropperModal').style.display = 'none';
            document.getElementById('mediaInput').value = ''; 
            if(cropper) cropper.destroy();
        }

        // Send the perfectly cropped square to Python
        function submitCroppedImage() {
            if (!cropper) return;
            cropper.getCroppedCanvas({ width: 800, height: 800 }).toBlob((blob) => {
                const fd = new FormData();
                fd.append('mediaFile', blob, 'cropped_' + Date.now() + '.png');
                fd.append('caption', document.getElementById('captionInput').value);
                fd.append('font', document.getElementById('fontInput').value);
                fd.append('filter', document.getElementById('filterInput').value);
                fetch('/upload', {method:'POST', body:fd}).then(() => window.location.reload());
            }, 'image/png');
        }
// Send the original, uncropped image to Python
function submitOriginalImage() {
    const file = document.getElementById('mediaInput').files[0];
    if (!file) return;
    
    const fd = new FormData();
    fd.append('mediaFile', file);
    fd.append('caption', document.getElementById('captionInput').value);
    fd.append('font', document.getElementById('fontInput').value);
    fd.append('filter', document.getElementById('filterInput').value);
    
    // Disable buttons to prevent double-posting
    document.querySelectorAll('#cropperModal .upload-btn').forEach(btn => btn.disabled = true);
    
    fetch('/upload', {method:'POST', body:fd}).then(() => window.location.reload());
}
        // Fallback for Videos
      // Fallback for Videos and Uncropped Images
function uploadVideoFallback() {
    const file = document.getElementById('mediaInput').files[0];
    if(!file) return alert("Select a file first!");
    
    // Removed the alert that blocked images!
    
    const fd = new FormData(); 
    fd.append('mediaFile', file); 
    fd.append('caption', document.getElementById('captionInput').value);
    fd.append('font', document.getElementById('fontInput').value); 
    fd.append('filter', document.getElementById('filterInput').value);
    
    fetch('/upload', {method:'POST', body:fd}).then(() => window.location.reload());
}

        // --- INTERACTIONS ---
        function createCardHTML(item) {
            const isVideo = item.filename.match(/\.(mp4|webm|mov)$/i);
            const hasLiked = item.likes && item.likes.includes(currentUser); const likeCount = item.likes ? item.likes.length : 0;
            let commentsHtml = ''; if (item.comments) item.comments.forEach(c => commentsHtml += `<div class="comment-item"><b class="user-tag" onclick="viewUserProfile('${c.author}')" style="font-size:14px; margin:0;">${c.author}:</b> ${c.text}</div>`);
            let deleteBtn = item.owner === currentUser ? `<span style="cursor:pointer;" title="Delete" onclick="deletePost('${item.id}')">🗑️</span>` : '';
            return `
                <div class="media-card">
                    <div class="user-tag" onclick="viewUserProfile('${item.owner}')">@${item.owner}</div>
                    <${isVideo ? 'video controls' : 'img'} src="/uploads/${item.filename}" style="filter: ${item.filter};">
                    <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:22px;">
                        <span style="cursor:pointer; user-select:none;" onclick="likePost('${item.id}')">${hasLiked ? '❤️' : '🤍'} ${likeCount}</span>
                        ${deleteBtn}
                    </div>
                    <p class="media-caption" style="font-family:${item.font}; color:var(--accent); font-size:22px; margin: 10px 0;">${item.caption}</p>
                    <div class="comments-section">${commentsHtml}</div>
                    <div class="comment-input-row">
                        <input type="text" id="comment-input-${item.id}" placeholder="Add a comment...">
                        <button class="upload-btn" style="padding: 5px 15px; border-radius: 8px;" onclick="addComment('${item.id}')">Post</button>
                    </div>
                </div>`;
        }
        function likePost(id) { fetch('/like/' + id, {method:'POST'}).then(() => window.location.reload()); }
        function deletePost(id) { if(confirm("Delete this memory?")) fetch('/delete/' + id, {method:'POST'}).then(() => window.location.reload()); }
        function addComment(postId) {
            const text = document.getElementById('comment-input-' + postId).value; if (!text) return;
            const fd = new FormData(); fd.append('text', text); fetch('/comment/' + postId, { method: 'POST', body: fd }).then(() => window.location.reload());
        }

        window.onload = () => { if(localStorage.getItem('theme') === 'dark') toggleTheme(); loadHome(); };
        window.onload = () => { 
    if(localStorage.getItem('theme') === 'dark') toggleTheme(); 
    loadHome(); 
    if (typeof currentUser !== 'undefined') loadNotifications(); // NEW!
};
    </script>

    {% else %}
    <div class="auth-box">
    <h2 style="color: var(--accent);">Manshi{Tatty}</h2>
    
    <form action="/login" method="POST" style="display:flex; flex-direction:column; gap:10px;">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button class="upload-btn" type="submit">Login</button>
    </form>
    
    <a href="#" onclick="document.getElementById('forgotForm').style.display='flex'; return false;" style="font-size:12px; color:var(--text-color);">Forgot Password?</a>
    
    <form id="forgotForm" action="/forgot-password" method="POST" style="display:none; flex-direction:column; gap:10px; margin-top:10px; padding-top:10px; border-top:1px dashed var(--btn-bg);">
        <input type="email" name="email" placeholder="Enter your email to reset" required>
        <button class="upload-btn" type="submit" style="background:gray;">Send Reset Link</button>
    </form>

    <hr style="width: 100%; border-color: var(--bg-color);">
    
    <form action="/register" method="POST" style="display:flex; flex-direction:column; gap:10px;">
        <input type="text" name="username" placeholder="New Username" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="New Password" required>
        <button class="upload-btn" type="submit">Create Account</button>
    </form>
</div>
    {% endif %}
</body>
</html>
