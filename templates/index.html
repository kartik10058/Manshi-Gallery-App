<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manshi{Tatty} Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Dancing+Script:wght@700&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #ffe4e8; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 30px; color: #4a4a4a; margin: 0; }
        h1 { color: #d81b60; margin-bottom: 10px; font-size: 2.5em; }
        
        /* New Styles for Login and Header */
        .top-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 30px auto; padding: 10px 20px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .top-bar h2 { margin: 0; color: #ff6b8b; }
        .logout-btn { text-decoration: none; background-color: #4a4a4a; color: white; padding: 8px 16px; border-radius: 20px; font-weight: bold; }
        
        .auth-container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: 50px; }
        .auth-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .auth-box input { padding: 10px; border-radius: 8px; border: 2px solid #ff85a2; font-size: 16px; outline: none; }
        
        /* Gallery Styles */
        .upload-menu { background-color: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); display: inline-flex; flex-direction: column; gap: 15px; margin-bottom: 40px; max-width: 400px; text-align: left; }
        .upload-menu input[type="text"], .upload-menu select, .upload-menu input[type="file"] { padding: 10px; border-radius: 8px; border: 2px solid #ff85a2; font-size: 16px; width: 90%; outline: none; }
        .upload-btn { border: none; color: white; background-color: #ff85a2; padding: 12px 24px; border-radius: 25px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .upload-btn:hover { background-color: #ff6b8b; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1000px; margin: 0 auto; }
        .media-card { background-color: white; padding: 15px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; transition: transform 0.3s ease; }
        .media-card:hover { transform: scale(1.03); }
        .media-card img, .media-card video { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; background-color: black; cursor: pointer; }
        .media-caption { font-size: 24px; color: #d81b60; margin: 0; padding: 0 10px; word-wrap: break-word; }

        /* Lightbox Styles */
        .lightbox { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; flex-direction: column; }
        #lightbox-content-wrapper { position: relative; max-width: 80%; max-height: 80vh; display: flex; align-items: center; justify-content: center; }
        .lightbox img, .lightbox video { max-width: 100%; max-height: 80vh; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); cursor: pointer; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background-color: #ff85a2; color: white; border: none; width: 50px; height: 50px; font-size: 24px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1001; }
        .nav-btn:hover { background-color: #ff6b8b; }
        .prev-btn { left: 5%; } .next-btn { right: 5%; }
        .close-btn { position: absolute; top: 20px; right: 40px; color: white; font-size: 50px; cursor: pointer; font-weight: bold; }
        .close-btn:hover { color: #ff85a2; }
    </style>
</head>
<body>

    {% if username %}
        
        <div class="top-bar">
            <h2>🌸 Welcome, {{ username }}!</h2>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>

        <h1>Manshi{Tatty}</h1>
        
        <div class="upload-menu">
            <input type="file" id="mediaInput" accept="image/*,video/*">
            <input type="text" id="captionInput" placeholder="Write a sweet caption...">
            <select id="fontInput">
                <option value="'Segoe UI', sans-serif">Standard Font</option>
                <option value="'Dancing Script', cursive">Elegant Cursive</option>
                <option value="'Caveat', cursive">Cute Handwriting</option>
                <option value="'Pacifico', cursive">Bold Vintage</option>
            </select>
            <button class="upload-btn" onclick="uploadMedia()">Post to My Gallery</button>
        </div>

        <div class="gallery" id="galleryContainer"></div>

        <div id="lightbox" class="lightbox">
            <span class="close-btn" onclick="closeLightbox()">&times;</span>
            <button class="nav-btn prev-btn" onclick="prevSlide(event)">&#10094;</button>
            <div id="lightbox-content-wrapper"></div>
            <button class="nav-btn next-btn" onclick="nextSlide(event)">&#10095;</button>
        </div>

        <script>
            // Only run gallery logic if logged in
            const galleryContainer = document.getElementById('galleryContainer');
            const lightbox = document.getElementById('lightbox');
            const lightboxWrapper = document.getElementById('lightbox-content-wrapper');
            let mediaGalleryData = [];
            let currentSlideIndex = 0;

            window.onload = function() {
                fetch('/get-media')
                    .then(response => response.json())
                    .then(items => {
                        items.forEach(item => {
                            const fileUrl = '/uploads/' + item.filename;
                            const isVideo = item.filename.match(/\.(mp4|webm|ogg|mov)$/i);
                            displayMedia(fileUrl, isVideo ? 'video' : 'image', item.caption, item.font);
                        });
                    });
            };

            function uploadMedia() {
                const fileInput = document.getElementById('mediaInput');
                if (fileInput.files.length === 0) return alert("Select a file first!");

                const formData = new FormData();
                formData.append('mediaFile', fileInput.files[0]);
                formData.append('caption', document.getElementById('captionInput').value);
                formData.append('font', document.getElementById('fontInput').value);

                fetch('/upload', { method: 'POST', body: formData })
                    .then(() => window.location.reload());
            }

            function displayMedia(src, type, captionText, fontStyle) {
                const itemIndex = mediaGalleryData.length;
                mediaGalleryData.push({ src: src, type: type });

                const card = document.createElement('div');
                card.className = 'media-card';

                let mediaElement;
                if (type === 'image') {
                    mediaElement = document.createElement('img');
                    mediaElement.src = src;
                } else {
                    mediaElement = document.createElement('video');
                    mediaElement.src = src;
                    mediaElement.controls = true; 
                }
                mediaElement.onclick = function() { openLightbox(itemIndex); };
                card.appendChild(mediaElement);

                if (captionText) {
                    const textElement = document.createElement('p');
                    textElement.className = 'media-caption';
                    textElement.innerText = captionText;
                    textElement.style.fontFamily = fontStyle;
                    card.appendChild(textElement);
                }
                galleryContainer.appendChild(card);
            }

            function openLightbox(index) { currentSlideIndex = index; updateLightboxContent(); lightbox.style.display = 'flex'; }
            function closeLightbox() { lightbox.style.display = 'none'; lightboxWrapper.innerHTML = ''; }
            function nextSlide(event) { if(event) event.stopPropagation(); currentSlideIndex = (currentSlideIndex + 1) % mediaGalleryData.length; updateLightboxContent(); }
            function prevSlide(event) { if(event) event.stopPropagation(); currentSlideIndex = (currentSlideIndex - 1 + mediaGalleryData.length) % mediaGalleryData.length; updateLightboxContent(); }
            
            function updateLightboxContent() {
                lightboxWrapper.innerHTML = ''; 
                const item = mediaGalleryData[currentSlideIndex];
                let el;
                if (item.type === 'image') { el = document.createElement('img'); el.src = item.src; el.onclick = nextSlide; } 
                else { el = document.createElement('video'); el.src = item.src; el.controls = true; el.autoplay = true; }
                lightboxWrapper.appendChild(el);
            }
        </script>

    {% else %}
        
        <h1>Manshi{Tatty}</h1>
        <p>Welcome! Please log in or create an account to view your private gallery.</p>

        <div class="auth-container">
            <form action="/login" method="POST" class="auth-box">
                <h3 style="margin: 0; color: #ff6b8b;">Welcome Back</h3>
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="upload-btn">Login</button>
            </form>

            <form action="/register" method="POST" class="auth-box">
                <h3 style="margin: 0; color: #ff6b8b;">New Here?</h3>
                <input type="text" name="username" placeholder="Choose a Username" required>
                <input type="password" name="password" placeholder="Choose a Password" required>
                <button type="submit" class="upload-btn">Create Account</button>
            </form>
        </div>

    {% endif %}

</body>
</html>
