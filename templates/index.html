<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manshi{Tatty} Social</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Dancing+Script:wght@700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffe4e8;
            --text-color: #4a4a4a;
            --card-bg: white;
            --accent: #d81b60;
            --btn-bg: #ff85a2;
            --btn-hover: #ff6b8b;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg-color: #1a1a2e;
            --text-color: #e6e6e6;
            --card-bg: #16213e;
            --accent: #ff85a2;
            --btn-bg: #e94560;
            --btn-hover: #d81b60;
            --shadow: rgba(0,0,0,0.5);
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; transition: 0.4s; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 20px auto; padding: 10px 20px; background: var(--card-bg); border-radius: 15px; box-shadow: 0 4px 10px var(--shadow); transition: 0.4s; }
        .profile-pic { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--btn-bg); cursor: pointer; }
        .search-bar { padding: 8px 15px; border-radius: 20px; border: 2px solid var(--btn-bg); width: 250px; outline: none; background: var(--bg-color); color: var(--text-color); }
        .theme-btn { background: none; border: none; font-size: 24px; cursor: pointer; }

        .nav-tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .tab-btn { cursor: pointer; padding: 10px 20px; border-radius: 20px; background: var(--card-bg); border: 2px solid var(--btn-bg); font-weight: bold; color: var(--btn-bg); transition: 0.3s; }
        .tab-btn.active { background: var(--btn-bg); color: white; }
        .section { display: none; max-width: 1000px; margin: 0 auto; }
        .section.active { display: block; }
        
        .upload-menu { background-color: var(--card-bg); padding: 20px; border-radius: 15px; display: inline-flex; flex-direction: column; gap: 10px; margin-bottom: 30px; width: 350px; text-align: left; box-shadow: 0 4px 10px var(--shadow); transition: 0.4s; }
        .upload-btn { border: none; color: white; background-color: var(--btn-bg); padding: 10px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .upload-btn:hover { background-color: var(--btn-hover); }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .media-card { background: var(--card-bg); padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px var(--shadow); text-align: left; display: flex; flex-direction: column; transition: 0.4s;}
        .media-card img, .media-card video { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; }
        
        .comments-section { background: var(--bg-color); padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 14px; max-height: 150px; overflow-y: auto; transition: 0.4s;}
        .comment-item { margin-bottom: 5px; }
        .comment-input-row { display: flex; gap: 5px; margin-top: 10px; }
        .comment-input-row input { flex-grow: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--btn-bg); outline: none; background: var(--bg-color); color: var(--text-color); }
        
        /* NEW: Bio Box Styles */
        .bio-box { width: 95%; background: var(--bg-color); color: var(--text-color); border: 2px solid var(--btn-bg); border-radius: 10px; padding: 10px; resize: none; margin-bottom: 10px;}
        .user-header { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 30px; background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px var(--shadow); }

        .auth-box { background: var(--card-bg); padding: 30px; border-radius: 15px; width: 300px; margin: 20px auto; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 4px 10px var(--shadow); }
        input, select { padding: 10px; border-radius: 8px; border: 2px solid var(--btn-bg); outline: none; background: var(--card-bg); color: var(--text-color); transition: 0.4s; }
        
        /* The clickable username style */
        .user-tag { font-weight:bold; margin-bottom:10px; color:var(--btn-bg); cursor:pointer; display: inline-block; transition: 0.2s;}
        .user-tag:hover { transform: scale(1.05); text-decoration: underline; }
    </style>
</head>
<body>

    {% if username %}
    <script> const currentUser = "{{ username }}"; </script>

    <div class="top-bar">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="{% if pfp %}/uploads/{{ pfp }}{% else %}https://cdn-icons-png.flaticon.com/512/149/149071.png{% endif %}" class="profile-pic" onclick="document.getElementById('pfpInput').click()">
            <h3 style="margin:0;">{{ username }}</h3>
        </div>
        
        <input type="text" id="searchInput" class="search-bar" placeholder="Search #hashtags..." onkeyup="searchGallery()">
        
        <div style="display:flex; align-items:center; gap:15px;">
            <button class="theme-btn" id="themeToggleBtn" onclick="toggleTheme()">🌙</button>
            <a href="/logout" style="color: var(--text-color); font-weight:bold; text-decoration:none;">Logout</a>
        </div>
    </div>

    <form id="pfpForm" action="/update-pfp" method="POST" enctype="multipart/form-data" style="display:none;">
        <input type="file" id="pfpInput" name="pfp" accept="image/*" onchange="document.getElementById('pfpForm').submit()">
    </form>

    <h1 style="color: var(--accent);">Manshi{Tatty}</h1>

    <div class="nav-tabs">
        <div class="tab-btn active" onclick="showSection('home-sec', this); loadHome();">Home</div>
        <div class="tab-btn" onclick="showSection('profile-sec', this); loadProfile();">My Profile</div>
    </div>

    <div id="home-sec" class="section active">
        <div class="gallery" id="homeGallery"></div>
    </div>

    <div id="profile-sec" class="section">
        
        <div class="user-header">
            <h2 style="margin: 0;">My Profile</h2>
            <textarea id="myBioInput" class="bio-box" rows="2" placeholder="Write a short bio about yourself...">{{ bio }}</textarea>
            <button class="upload-btn" onclick="saveBio()">Save Bio</button>
        </div>

        <div class="upload-menu">
            <h3 style="margin: 0; color: var(--accent);">Post a Memory</h3>
            <input type="file" id="mediaInput" accept="image/*,video/*">
            <input type="text" id="captionInput" placeholder="Caption with #hashtags...">
            <div style="display: flex; gap: 10px;">
                <select id="fontInput" style="flex: 1;">
                    <option value="'Segoe UI'">Standard Text</option>
                    <option value="'Dancing Script', cursive">Elegant</option>
                    <option value="'Caveat', cursive">Handwriting</option>
                </select>
                <select id="filterInput" style="flex: 1;">
                    <option value="none">No Filter</option>
                    <option value="grayscale(100%)">Black & White</option>
                    <option value="sepia(100%)">Vintage</option>
                    <option value="contrast(150%)">High Contrast</option>
                    <option value="saturate(200%)">Vibrant</option>
                </select>
            </div>
            <button class="upload-btn" onclick="uploadMedia()">Post</button>
        </div>
        <div class="gallery" id="profileGallery"></div>
    </div>

    <div id="view-user-sec" class="section">
        <button class="upload-btn" onclick="showSection('home-sec', document.querySelectorAll('.tab-btn')[0]); loadHome();" style="margin-bottom: 20px;">← Back to Home</button>
        
        <div class="user-header">
            <img id="viewUserPfp" src="" class="profile-pic" style="width: 100px; height: 100px; border-width: 4px;">
            <h2 id="viewUserName" style="color: var(--accent); margin: 0; font-size: 32px;"></h2>
            <p id="viewUserBio" style="font-style: italic; font-size: 18px; color: var(--text-color);"></p>
        </div>
        
        <hr style="border: 1px solid var(--btn-bg); margin-bottom: 20px; opacity: 0.3;">
        <div class="gallery" id="viewUserGallery"></div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggleBtn').innerText = isDark ? '☀️' : '🌙';
        }

        function searchGallery() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const allCards = document.querySelectorAll('.media-card');
            allCards.forEach(card => {
                const caption = card.querySelector('.media-caption').innerText.toLowerCase();
                card.style.display = caption.includes(searchText) ? 'flex' : 'none';
            });
        }

        function showSection(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (btn) btn.classList.add('active'); // The View User section has no top tab button!
        }

        // NEW: Save your Bio
        function saveBio() {
            const fd = new FormData();
            fd.append('bio', document.getElementById('myBioInput').value);
            fetch('/update-bio', { method: 'POST', body: fd })
                .then(() => alert('Bio saved!'));
        }

        // NEW: View Someone Else's Profile!
        function viewUserProfile(targetUsername) {
            // If you click your own name, just take you to your own profile tab
            if (targetUsername === currentUser) {
                showSection('profile-sec', document.querySelectorAll('.tab-btn')[1]);
                loadProfile();
                return;
            }

            // Hide everything else and show the "View User" section
            showSection('view-user-sec', null);
            document.getElementById('viewUserName').innerText = "@" + targetUsername;

            // 1. Fetch their profile info (PFP and Bio)
            fetch('/api/user/' + targetUsername)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('viewUserPfp').src = data.pfp ? '/uploads/' + data.pfp : 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                    document.getElementById('viewUserBio').innerText = data.bio ? `"${data.bio}"` : "This user hasn't written a bio yet.";
                });

            // 2. Fetch their specific pictures
            fetch('/api/user-posts/' + targetUsername)
                .then(r => r.json())
                .then(items => {
                    const container = document.getElementById('viewUserGallery');
                    container.innerHTML = '';
                    items.forEach(item => container.innerHTML += createCardHTML(item));
                });
        }

        function loadHome() {
            fetch('/get-public-media').then(r => r.json()).then(items => {
                const container = document.getElementById('homeGallery');
                container.innerHTML = '';
                items.forEach(item => container.innerHTML += createCardHTML(item));
            });
        }

        function loadProfile() {
            fetch('/get-profile-media').then(r => r.json()).then(items => {
                const container = document.getElementById('profileGallery');
                container.innerHTML = '';
                items.forEach(item => container.innerHTML += createCardHTML(item));
            });
        }

        function createCardHTML(item) {
            const isVideo = item.filename.match(/\.(mp4|webm|mov)$/i);
            const hasLiked = item.likes && item.likes.includes(currentUser);
            const likeCount = item.likes ? item.likes.length : 0;
            
            let commentsHtml = '';
            if (item.comments) {
                item.comments.forEach(c => {
                    // Clickable usernames inside the comments too!
                    commentsHtml += `<div class="comment-item"><b class="user-tag" onclick="viewUserProfile('${c.author}')" style="font-size:14px; margin:0;">${c.author}:</b> ${c.text}</div>`;
                });
            }

            let deleteBtn = item.owner === currentUser 
                ? `<span style="cursor:pointer;" title="Delete" onclick="deletePost('${item.id}')">🗑️</span>` 
                : '';

            return `
                <div class="media-card">
                    <div class="user-tag" onclick="viewUserProfile('${item.owner}')">@${item.owner}</div>
                    
                    <${isVideo ? 'video controls' : 'img'} src="/uploads/${item.filename}" style="filter: ${item.filter};">
                    
                    <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:22px;">
                        <span style="cursor:pointer; user-select:none;" onclick="likePost('${item.id}')">${hasLiked ? '❤️' : '🤍'} ${likeCount}</span>
                        ${deleteBtn}
                    </div>
                    
                    <p class="media-caption" style="font-family:${item.font}; color:var(--accent); font-size:22px; margin: 10px 0;">${item.caption}</p>
                    
                    <div class="comments-section">${commentsHtml}</div>
                    
                    <div class="comment-input-row">
                        <input type="text" id="comment-input-${item.id}" placeholder="Add a comment...">
                        <button class="upload-btn" style="padding: 5px 15px; border-radius: 8px;" onclick="addComment('${item.id}')">Post</button>
                    </div>
                </div>`;
        }

        function uploadMedia() {
            const file = document.getElementById('mediaInput').files[0];
            if(!file) return alert("Select file!");
            const fd = new FormData();
            fd.append('mediaFile', file);
            fd.append('caption', document.getElementById('captionInput').value);
            fd.append('font', document.getElementById('fontInput').value);
            fd.append('filter', document.getElementById('filterInput').value);
            fetch('/upload', {method:'POST', body:fd}).then(() => window.location.reload());
        }

        function likePost(id) { fetch('/like/' + id, {method:'POST'}).then(() => window.location.reload()); }
        function deletePost(id) { if(confirm("Delete this memory?")) fetch('/delete/' + id, {method:'POST'}).then(() => window.location.reload()); }

        function addComment(postId) {
            const text = document.getElementById('comment-input-' + postId).value;
            if (!text) return;
            const fd = new FormData();
            fd.append('text', text);
            fetch('/comment/' + postId, { method: 'POST', body: fd }).then(() => window.location.reload());
        }

        window.onload = () => {
            if(localStorage.getItem('theme') === 'dark') toggleTheme();
            loadHome();
        };
    </script>

    {% else %}
    <div class="auth-box">
        <h2 style="color: var(--accent);">Manshi{Tatty}</h2>
        <form action="/login" method="POST" style="display:flex; flex-direction:column; gap:10px;">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button class="upload-btn" type="submit">Login</button>
        </form>
        <hr style="width: 100%; border-color: var(--bg-color);">
        <form action="/register" method="POST" style="display:flex; flex-direction:column; gap:10px;">
            <input type="text" name="username" placeholder="New Username" required>
            <input type="password" name="password" placeholder="New Password" required>
            <button class="upload-btn" type="submit">Create Account</button>
        </form>
    </div>
    {% endif %}
</body>
</html>
